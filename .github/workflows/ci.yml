name: TxGuard CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - uses: actions/cache@v3
      name: Setup pnpm cache
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Format Check
      run: pnpm run format:check --if-present
      
    - name: Lint
      run: pnpm run lint
      
    - name: Test Core
      run: pnpm --filter @txguard/core test
      
    - name: Test Extension
      run: pnpm --filter extension test
      
    - name: Build Core
      run: pnpm --filter @txguard/core build
      
    - name: Build API
      run: pnpm --filter api build
      
    - name: Build Extension
      run: pnpm --filter extension build
      
    - name: Archive Extension Build
      uses: actions/upload-artifact@v3
      with:
        name: txguard-extension
        path: apps/extension/.output/
